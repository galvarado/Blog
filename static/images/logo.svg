<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380">
  <defs>
    <clipPath id="circ">
      <circle cx="410" cy="110" r="88"/>
    </clipPath>
  </defs>

  <!-- G mark: base deep indigo -->
  <circle cx="410" cy="110" r="88" fill="#312e81"/>

  <!-- Top-right sector: violet accent -->
  <path d="M410,110 L410,22 A88,88 0 0,1 498,110 Z" fill="#6366f1"/>

  <!-- Bottom-left sector: blue-indigo depth -->
  <path d="M410,110 L322,110 A88,88 0 0,0 410,198 Z" fill="#4338ca"/>

  <!-- Teal crossbar -->
  <rect x="410" y="88" width="88" height="44" fill="#2dd4bf" clip-path="url(#circ)"/>

  <!-- Name -->
  <text
    x="410" y="290"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-2"
  >Guillermo Alvarado</text>

  <!-- Tagline -->
  <text
    x="410" y="344"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="500"
    fill="#a5b4fc"
    letter-spacing="1"
  >AI, Cloud &amp; Platform Engineering</text>
</svg>
