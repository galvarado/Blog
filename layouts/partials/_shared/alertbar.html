<!-- Newsletter Popup
================================================== -->
<div class="newsletter-popup" id="alertbar">
    <button class="newsletter-close" onclick="document.getElementById('alertbar').style.display='none';localStorage.setItem('alertbar-closed',new Date().toDateString())" aria-label="Cerrar">&times;</button>
    <p class="newsletter-title">Suscríbete al blog</p>
    <p class="newsletter-desc">Nuevos posts de AI, Cloud y Platform Engineering directo en tu correo.</p>
    <form action="{{ with .Site.Params.mailchimp }}{{.}}{{end}}" method="post" name="mc-embedded-subscribe-form" target="_blank" novalidate>
        <div style="position:absolute;left:-5000px;" aria-hidden="true"><input type="text" name="{{ with .Site.Params.mailprotect }}{{.}}{{end}}" tabindex="-1" value=""></div>
        <input type="email" placeholder="tu@correo.com" name="EMAIL" autocomplete="on" required>
        <input type="submit" value="Suscribirse">
    </form>
    <script>
        currentUrl=window.location.href;
        if(currentUrl=="https://galvarado.com.mx/static/location/") {
            window.location.replace("https://goo.gl/maps/BfSgCgStr6FsHeF4A");
        }
        if(localStorage.getItem('alertbar-closed') !== new Date().toDateString()) {
            setTimeout(function() {
                document.getElementById('alertbar').style.display = 'block';
            }, 4000);
        }
    </script>
</div>
